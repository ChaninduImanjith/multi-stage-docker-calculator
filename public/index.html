<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Calculator — Professional & Modern</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <!-- Ambient background glow elements -->
    <div class="glow-bg">
        <div class="blob blob-purple"></div>
        <div class="blob blob-cyan"></div>
        <div class="blob blob-pink"></div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Calculator Card -->
        <main class="calculator-card" id="calculatorCard">
            <!-- Header Controls -->
            <header class="calc-header">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <h1>Aura Calc</h1>
                </div>
                <div class="controls-group">
                    <!-- Audio feedback toggle -->
                    <button class="icon-btn" id="soundToggle" title="Toggle Sound Feedback">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path class="volume-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </button>
                    <!-- Scientific mode toggle -->
                    <button class="icon-btn" id="scientificToggle" title="Scientific Mode">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="9"></line>
                            <line x1="9" y1="13" x2="15" y2="13"></line>
                            <line x1="9" y1="17" x2="15" y2="17"></line>
                        </svg>
                    </button>
                    <!-- History toggle -->
                    <button class="icon-btn" id="historyToggle" title="History Log">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </button>
                    <!-- Theme Toggle -->
                    <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                        <svg class="icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Screen Area -->
            <section class="display-section">
                <!-- Upper display for mathematical formula / history context -->
                <div class="expression-display" id="exprDisplay"></div>
                <!-- Lower display for active input / live preview / result -->
                <div class="input-display-container">
                    <span class="live-preview-indicator" id="livePreviewIndicator">Preview</span>
                    <div class="input-display" id="mainDisplay">0</div>
                </div>
            </section>

            <!-- Keypad Area -->
            <section class="keypad-section">
                
                <!-- Scientific panel (expandable/slideable) -->
                <div class="scientific-panel" id="scientificPanel">
                    <button class="key sci-key" data-val="sin(" title="Sine">sin</button>
                    <button class="key sci-key" data-val="cos(" title="Cosine">cos</button>
                    <button class="key sci-key" data-val="tan(" title="Tangent">tan</button>
                    <button class="key sci-key" data-val="^" title="Power">x<sup>y</sup></button>
                    
                    <button class="key sci-key" data-val="sqrt(" title="Square Root">√</button>
                    <button class="key sci-key" data-val="pi" title="Pi (3.1415...)">π</button>
                    <button class="key sci-key" data-val="e" title="Euler's Constant">e</button>
                    <button class="key sci-key" data-val="log(" title="Log Base 10">log</button>

                    <button class="key sci-key" data-val="ln(" title="Natural Log">ln</button>
                    <button class="key sci-key" data-val="(" title="Open Parenthesis">(</button>
                    <button class="key sci-key" data-val=")" title="Close Parenthesis">)</button>
                    <button class="key sci-key" data-val="!" title="Factorial">x!</button>
                </div>

                <!-- Standard Calculator Grid -->
                <div class="standard-grid">
                    <!-- Row 1 -->
                    <button class="key action-key" data-val="clear" id="key-clear" title="Clear All (Esc)">AC</button>
                    <button class="key action-key" data-val="negate" id="key-negate" title="Toggle Sign">±</button>
                    <button class="key action-key" data-val="percent" id="key-percent" title="Percentage">%</button>
                    <button class="key operator-key" data-val="/" id="key-divide" title="Divide (/)">÷</button>

                    <!-- Row 2 -->
                    <button class="key number-key" data-val="7" id="key-7">7</button>
                    <button class="key number-key" data-val="8" id="key-8">8</button>
                    <button class="key number-key" data-val="9" id="key-9">9</button>
                    <button class="key operator-key" data-val="*" id="key-multiply" title="Multiply (*)">×</button>

                    <!-- Row 3 -->
                    <button class="key number-key" data-val="4" id="key-4">4</button>
                    <button class="key number-key" data-val="5" id="key-5">5</button>
                    <button class="key number-key" data-val="6" id="key-6">6</button>
                    <button class="key operator-key" data-val="-" id="key-subtract" title="Subtract (-)">−</button>

                    <!-- Row 4 -->
                    <button class="key number-key" data-val="1" id="key-1">1</button>
                    <button class="key number-key" data-val="2" id="key-2">2</button>
                    <button class="key number-key" data-val="3" id="key-3">3</button>
                    <button class="key operator-key" data-val="+" id="key-add" title="Add (+)">+</button>

                    <!-- Row 5 -->
                    <button class="key number-key" data-val="0" id="key-0">0</button>
                    <button class="key number-key" data-val="." id="key-decimal">.</button>
                    <button class="key action-key" data-val="backspace" id="key-backspace" title="Backspace (⌫)">
                        <svg class="backspace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                            <line x1="18" y1="9" x2="12" y2="15"></line>
                            <line x1="12" y1="9" x2="18" y2="15"></line>
                        </svg>
                    </button>
                    <button class="key equals-key" data-val="equals" id="key-equals" title="Calculate (Enter)">=</button>
                </div>
            </section>
        </main>

        <!-- History Sidebar Drawer -->
        <aside class="history-drawer" id="historyDrawer">
            <div class="drawer-header">
                <h2>Calculation History</h2>
                <button class="icon-btn close-drawer-btn" id="closeHistory" title="Close Drawer">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="history-list-container" id="historyListContainer">
                <div class="empty-history-msg" id="emptyHistoryMsg">No calculations recorded yet</div>
                <ul class="history-list" id="historyList"></ul>
            </div>
            <div class="drawer-footer">
                <button class="text-btn clear-history-btn" id="clearHistoryBtn">Clear History</button>
            </div>
        </aside>
    </div>

    <!-- Hidden audio element for keyclick sound feedback -->
    <audio id="clickSound" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
